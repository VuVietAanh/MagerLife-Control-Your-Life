services:
  - type: web
    name: magerlife-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MAGERLIFE_API_HOST
        value: 0.0.0.0
      - key: MAGERLIFE_API_PORT
        value: 8787
      - key: MAGERLIFE_DB_DRIVER
        value: postgres
      - key: DATABASE_SSL
        value: true
      - key: MAGERLIFE_ENABLE_REAL_LLM
        value: false
      - key: MAGERLIFE_LLM_PROVIDER
        value: mock
      - key: MAGERLIFE_CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MAGERLIFE_SESSION_SECRET
        generateValue: true
      - key: MAGERLIFE_BILLING_WEBHOOK_SECRET
        generateValue: true
      - key: MAGERLIFE_ADMIN_EMAILS
        sync: false
      - key: GROQ_API_KEY
        sync: false

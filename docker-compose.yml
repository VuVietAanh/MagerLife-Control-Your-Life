services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: magerlife
      POSTGRES_USER: magerlife
      POSTGRES_PASSWORD: magerlife
    ports:
      - "5432:5432"
    volumes:
      - magerlife-postgres-data:/var/lib/postgresql/data
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docs/database/seed-dev.sql:/docker-entrypoint-initdb.d/02-seed-dev.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magerlife -d magerlife"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.docker
    environment:
      MAGERLIFE_API_HOST: 0.0.0.0
      MAGERLIFE_API_PORT: 8787
      MAGERLIFE_DB_DRIVER: postgres
      DATABASE_URL: postgres://magerlife:magerlife@db:5432/magerlife
      DATABASE_SSL: "false"
    ports:
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_MAGERLIFE_API_BASE_URL: http://localhost:8787
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  magerlife-postgres-data:

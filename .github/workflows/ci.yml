name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check deploy config
        run: npm run check:deploy

      - name: Check server syntax
        run: |
          node --check src/server/mockApiServer.mjs
          node --check src/server/dbRepository.mjs
          node --check src/server/paymentProviders.mjs
